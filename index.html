<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>로또 번호 생성기</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <button id="theme-toggle" aria-label="다크 모드 전환">🌙</button>
    <h1>로또 번호 생성기</h1>
    <div id="numbers-container"></div>
    <button id="generate-button">새 번호 생성</button>

    <div id="contact-container">
        <h2 id="contact-title">제휴 문의</h2>
        <form action="https://formspree.io/f/xpqyjdvw" method="POST">
            <input type="text" name="name" placeholder="성함 또는 업체명" required>
            <input type="email" name="email" placeholder="이메일 주소" required>
            <textarea name="message" placeholder="문의 내용을 입력해주세요" required></textarea>
            <button type="submit" id="submit-button">문의 보내기</button>
        </form>
    </div>

    <script src="main.js" type="module"></script>
</body>
</html>
